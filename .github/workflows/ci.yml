name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Build and verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check private paths
        run: pnpm private:check

      - name: Scan demo token fixtures
        run: pnpm tokens:scan

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Playwright browser
        run: pnpm --filter @demo-ds/storybook exec playwright install chromium --with-deps

      - name: Test
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      - name: Check token quality report
        run: pnpm tokens:quality:check

      - name: Build Storybook
        run: pnpm --filter @demo-ds/storybook build

      - name: Build example app
        run: pnpm --filter @demo-ds/example build

      - name: Check package exports
        run: pnpm package:check

      - name: Check package tarballs
        run: pnpm pack:check

      - name: Check architecture boundaries
        run: pnpm architecture:check

      - name: Scan full repository
        run: pnpm repo:scan

      - name: Check formatting
        run: pnpm format:check

      - name: Check generated output drift
        run: git diff --exit-code
